<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#d4af6a;
    --accent-2:#e8c584;
    --success:#5fb488;
    --warning:#d4af6a;
    --error:#c8695f;
    --glass:rgba(255,255,255,0.05);
    --glass-border:rgba(212,175,106,0.16);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:24px;
    color:#f1ede4;
    background:#0c0b09;
  }
  .container{
    width:100%; max-width:460px;
    background:#151310;
    border:1px solid var(--glass-border);
    border-radius:20px;
    padding:32px 28px;
    text-align:center;
    position:relative;
  }

  /* Top bar (settings) */
  .icon-btn{
    position:absolute; top:18px;
    width:36px; height:36px; border-radius:10px;
    border:1px solid var(--glass-border);
    background:rgba(255,255,255,0.04);
    color:#a89c86; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; transition:all .2s ease;
  }
  .icon-btn:hover{ color:#f1ede4; border-color:var(--accent-2); }
  #settingsBtn{ right:18px; }

  .logo-preview{
    max-height:44px; max-width:140px; margin:0 auto 10px; display:block; border-radius:8px;
  }

  .eyebrow{
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--accent-2); font-weight:600; margin-bottom:6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:24px; font-weight:700;
    background:linear-gradient(90deg,#f8f4ea,#e8c584);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:4px;
  }
  h2{
    font-size:14px; font-weight:500; color:#a89c86;
    margin-bottom:8px; min-height:18px;
  }

  /* Dashboard */
  .dashboard{
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
    margin:16px 0 20px;
  }
  .stat-card{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--glass-border);
    border-radius:12px; padding:10px 4px;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .stat-card .icon{ font-size:16px; }
  .stat-card .value{
    font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:700; color:#f1ede4;
    transition:transform .2s ease;
  }
  .stat-card .value.bump{ transform:scale(1.25); color:var(--accent-2); }
  .stat-card .label{ font-size:9px; color:#a89c86; text-transform:uppercase; letter-spacing:0.05em; }

  /* Toolbar (search / reports) */
  .toolbar{
    display:flex; gap:8px; margin-bottom:16px;
  }
  .tool-btn{
    flex:1; padding:10px; border-radius:10px;
    border:1px solid var(--glass-border);
    background:rgba(255,255,255,0.04); color:#e8dfd0;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
    cursor:pointer; transition:all .2s ease;
  }
  .tool-btn:hover{ border-color:var(--accent-2); color:#f8f4ea; }

  /* Mode selector */
  .mode-toggle{
    display:flex; gap:8px; margin-bottom:20px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--glass-border);
    border-radius:14px; padding:5px;
  }
  .mode-btn{
    flex:1; border:none; cursor:pointer;
    padding:12px 10px; border-radius:10px;
    font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
    background:transparent; color:#a89c86;
    transition:all 0.2s ease;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .mode-btn.active{
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:#151310;
  }
  .mode-btn:not(.active):hover{ color:#f1ede4; }

  .payment-fields{
    display:none;
    gap:10px;
    margin-bottom:18px;
  }
  .payment-fields.visible{ display:flex; }

  .grade-field{ margin-bottom:16px; text-align:left; }
  .grade-field label{
    display:block; font-size:11px; color:var(--accent-2);
    text-transform:uppercase; letter-spacing:0.06em;
    margin-bottom:6px; font-weight:600;
  }
  .grade-field select{
    width:100%; padding:10px 12px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--glass-border);
    border-radius:10px; color:#f1ede4;
    font-family:'Inter',sans-serif; font-size:14px;
    outline:none; appearance:none; cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23a89c86'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center;
  }
  .grade-field select:focus{ border-color:var(--accent-2); }
  .grade-field select option{ background:#151310; color:#f1ede4; }
  .field-group{
    flex:1; text-align:left;
  }
  .field-group label{
    display:block; font-size:11px; color:var(--accent-2);
    text-transform:uppercase; letter-spacing:0.06em;
    margin-bottom:6px; font-weight:600;
  }
  .field-group input{
    width:100%; padding:10px 12px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--glass-border);
    border-radius:10px; color:#f1ede4;
    font-family:'Inter',sans-serif; font-size:14px;
    outline:none;
  }
  .field-group input:focus{ border-color:var(--accent-2); }
  .field-group input::-webkit-calendar-picker-indicator{ filter:invert(0.8); }
  .hint{
    font-size:11px; color:#c8695f; text-align:center;
    margin-bottom:14px; min-height:14px;
  }

  .scan-frame{
    position:relative; border-radius:16px; overflow:hidden;
    border:1px solid var(--glass-border);
    background:#000;
    transition:opacity .2s ease;
  }
  .scan-frame.hidden{ display:none; }
  #reader{ width:100%; }
  .corner{
    position:absolute; width:26px; height:26px; z-index:3; pointer-events:none;
    border-color:var(--accent-2);
  }
  .corner.tl{ top:10px; left:10px; border-top:3px solid; border-left:3px solid; border-radius:6px 0 0 0; }
  .corner.tr{ top:10px; right:10px; border-top:3px solid; border-right:3px solid; border-radius:0 6px 0 0; }
  .corner.bl{ bottom:10px; left:10px; border-bottom:3px solid; border-left:3px solid; border-radius:0 0 0 6px; }
  .corner.br{ bottom:10px; right:10px; border-bottom:3px solid; border-right:3px solid; border-radius:0 0 6px 0; }
  .scan-line{
    position:absolute; left:6%; width:88%; height:2px; z-index:2;
    background:var(--accent-2);
    animation:sweep 2s linear infinite;
  }
  @keyframes sweep{
    0%{ top:8%; }
    100%{ top:92%; }
  }
  .scan-frame.locked .scan-line{ display:none; }

  /* Cooldown badge over scanner */
  .cooldown-badge{
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    z-index:4; background:rgba(12,11,9,0.85); border:1px solid var(--accent-2);
    color:var(--accent-2); font-size:12px; font-weight:600;
    padding:5px 12px; border-radius:999px; display:none;
  }
  .cooldown-badge.show{ display:block; }

  #status{
    margin-top:20px;
    display:inline-flex; align-items:center; gap:8px;
    font-size:15px; font-weight:600;
    padding:10px 18px; border-radius:999px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--glass-border);
    transition:all 0.25s ease;
  }
  .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .wait .dot{ background:var(--warning); box-shadow:0 0 8px var(--warning); animation:pulse 1.4s infinite; }
  .success{ color:var(--success); border-color:rgba(95,180,136,0.35) !important; background:rgba(95,180,136,0.08) !important; }
  .success .dot{ background:var(--success); box-shadow:0 0 8px var(--success); }
  .duplicate{ color:var(--warning); border-color:rgba(212,175,106,0.35) !important; background:rgba(212,175,106,0.08) !important; }
  .duplicate .dot{ background:var(--warning); box-shadow:0 0 8px var(--warning); }
  .warning{ color:var(--warning); border-color:rgba(212,175,106,0.35) !important; background:rgba(212,175,106,0.08) !important; }
  .warning .dot{ background:var(--warning); box-shadow:0 0 8px var(--warning); }
  .error{ color:var(--error); border-color:rgba(200,105,95,0.35) !important; background:rgba(200,105,95,0.08) !important; }
  .error .dot{ background:var(--error); box-shadow:0 0 8px var(--error); }
  .wait{ color:var(--warning); }

  #status.detailed{
    display:block; width:100%; text-align:left; border-radius:16px;
    padding:0; font-weight:400; line-height:1.6; overflow:hidden;
  }
  #status.detailed .dot{ display:none; }

  /* Big result card */
  .result-card{ padding:18px 20px; }
  .result-check{
    font-size:34px; text-align:center; margin-bottom:6px;
    animation:checkPop .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes checkPop{
    0%{ transform:scale(0); opacity:0; }
    60%{ transform:scale(1.3); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }
  .result-title{
    text-align:center; font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:16px; margin-bottom:12px;
  }
  .result-divider{ height:1px; background:var(--glass-border); margin:12px 0; }
  .result-student{
    display:flex; align-items:center; gap:12px; margin-bottom:4px;
  }
  .result-photo{
    width:52px; height:52px; border-radius:12px; object-fit:cover; flex-shrink:0;
    border:1px solid var(--glass-border); background:rgba(255,255,255,0.06);
  }
  .result-photo-fallback{
    width:52px; height:52px; border-radius:12px; flex-shrink:0;
    border:1px solid var(--glass-border); background:rgba(255,255,255,0.06);
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .result-name{ font-weight:700; font-size:15px; color:#f8f4ea; }
  .result-sub{ font-size:12px; color:#a89c86; margin-top:2px; }
  .result-stats{
    display:flex; gap:8px; margin-top:14px;
  }
  .result-stat{
    flex:1; background:rgba(255,255,255,0.04); border:1px solid var(--glass-border);
    border-radius:10px; padding:8px 4px; text-align:center;
  }
  .result-stat .num{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; }
  .result-stat .lab{ font-size:9px; color:#a89c86; text-transform:uppercase; letter-spacing:0.05em; margin-top:2px; }
  .chip{
    display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:700;
  }
  .chip.paid{ background:rgba(95,180,136,0.15); color:var(--success); }
  .chip.unpaid{ background:rgba(200,105,95,0.15); color:var(--error); }

  /* Manual "scan next" action on the result card */
  .next-scan-btn{
    width:100%; margin-top:14px; padding:11px; border:none; border-radius:10px;
    cursor:pointer; font-weight:700; font-size:13px; font-family:'Inter',sans-serif;
    background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#151310;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .next-scan-btn:hover{ filter:brightness(1.05); }
  .auto-resume-note{
    text-align:center; font-size:11px; color:#7a7263; margin-top:8px;
  }

  /* Spinner */
  .spinner{
    width:16px; height:16px; border-radius:50%;
    border:2px solid rgba(255,255,255,0.15); border-top-color:var(--accent-2);
    animation:spin .7s linear infinite; flex-shrink:0;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* History */
  .history{ margin-top:22px; text-align:left; }
  .history-title{
    font-size:11px; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--accent-2); font-weight:700; margin-bottom:10px;
  }
  .history-list{ display:flex; flex-direction:column; gap:0; }
  .history-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 2px; border-bottom:1px solid rgba(255,255,255,0.05);
    font-size:13px;
  }
  .history-item:last-child{ border-bottom:none; }
  .history-name{ display:flex; align-items:center; gap:8px; color:#e8dfd0; }
  .history-time{ color:#7a7263; font-size:12px; }
  .history-empty{ color:#7a7263; font-size:12px; text-align:center; padding:10px 0; }

  .footer{
    margin-top:22px; font-size:12px; color:#7a7263;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .footer::before, .footer::after{ content:""; flex:1; height:1px; background:var(--glass-border); }

  /* Modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    width:100%; max-width:380px; max-height:85vh; overflow-y:auto;
    background:#171410; border:1px solid var(--glass-border); border-radius:18px;
    padding:22px 20px; text-align:left;
  }
  .modal-header{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
  }
  .modal-title{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; }
  .modal-close{
    background:none; border:none; color:#a89c86; font-size:20px; cursor:pointer; line-height:1;
  }
  .modal-close:hover{ color:#f1ede4; }
  .modal input[type="text"], .modal input[type="number"], .modal input[type="color"], .modal input[type="url"], .modal select{
    width:100%; padding:10px 12px; margin-bottom:12px;
    background:rgba(255,255,255,0.04); border:1px solid var(--glass-border);
    border-radius:10px; color:#f1ede4; font-family:'Inter',sans-serif; font-size:14px; outline:none;
  }
  .modal select{ cursor:pointer; appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23a89c86'/></svg>");
    background-repeat:no-repeat; background-position:right 14px center;
  }
  .modal select option{ background:#171410; color:#f1ede4; }
  .modal input:focus{ border-color:var(--accent-2); }
  .modal label{
    display:block; font-size:11px; color:var(--accent-2); text-transform:uppercase;
    letter-spacing:0.06em; margin-bottom:6px; font-weight:600;
  }
  .modal-btn{
    width:100%; padding:12px; border:none; border-radius:10px; cursor:pointer;
    font-weight:700; font-size:14px; margin-top:4px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2)); color:#151310;
  }
  .report-list{ display:flex; flex-direction:column; gap:8px; }
  .report-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-radius:10px; border:1px solid var(--glass-border);
    background:rgba(255,255,255,0.04); cursor:pointer; font-size:14px; color:#e8dfd0;
    transition:all .2s ease;
  }
  .report-item:hover{ border-color:var(--accent-2); color:#f8f4ea; }
  .report-result{
    margin-top:14px; padding:14px; border-radius:10px; background:rgba(255,255,255,0.04);
    border:1px solid var(--glass-border); font-size:13px; line-height:1.7; display:none;
  }
  .report-result.show{ display:block; }

  @media (prefers-reduced-motion: reduce){
    .scan-line, .dot, .result-check, .spinner{ animation:none !important; }
  }
</style>
</head>
<body>

<div class="container">
  <button type="button" class="icon-btn" id="settingsBtn" onclick="openModal('settingsModal')" title="Settings">⚙️</button>

  <img id="logoPreview" class="logo-preview" style="display:none;">

  <div class="eyebrow">Live scanner</div>
  <h1>Student Attendance System</h1>
  <h2 id="centerNameDisplay"></h2>

  <div class="dashboard">
    <div class="stat-card">
      <div class="icon">👨‍🎓</div>
      <div class="value" id="statStudents">–</div>
      <div class="label">Students</div>
    </div>
    <div class="stat-card">
      <div class="icon">✅</div>
      <div class="value" id="statPresent">0</div>
      <div class="label">Present</div>
    </div>
    <div class="stat-card">
      <div class="icon">❌</div>
      <div class="value" id="statAbsent">–</div>
      <div class="label">Absent</div>
    </div>
    <div class="stat-card">
      <div class="icon">💰</div>
      <div class="value" id="statPaid">0</div>
      <div class="label">Paid</div>
    </div>
  </div>

  <div class="toolbar">
    <button type="button" class="tool-btn" onclick="openModal('searchModal')">🔍 Search Student</button>
    <button type="button" class="tool-btn" onclick="openModal('reportsModal')">📊 Reports</button>
  </div>

  <div class="mode-toggle">
    <button type="button" class="mode-btn active" id="modeAttendance" onclick="setMode('attendance')">
      🎓 Attendance
    </button>
    <button type="button" class="mode-btn" id="modePayment" onclick="setMode('payment')">
      💳 Payment
    </button>
  </div>

  <div class="grade-field">
    <label for="gradeLevel">Grade Level</label>
    <select id="gradeLevel" onchange="setGrade(this.value)">
      <option value="first">First Secondary</option>
      <option value="second">Second Secondary</option>
      <option value="third">Third Secondary</option>
    </select>
  </div>

  <div class="payment-fields" id="paymentFields">
    <div class="field-group">
      <label for="payMonth">Month</label>
      <input type="month" id="payMonth">
    </div>
    <div class="field-group">
      <label for="payAmount">Amount (EGP)</label>
      <input type="number" id="payAmount" placeholder="e.g. 300" min="0">
    </div>
  </div>
  <div class="hint" id="paymentHint"></div>

  <div class="scan-frame" id="scanFrame">
    <div class="cooldown-badge" id="cooldownBadge">⏳ Wait <span id="cooldownSeconds">5</span>s</div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line"></div>
    <div id="reader"></div>
  </div>

  <div id="status" class="wait">
    <span class="dot"></span>
    <span id="status-text">Waiting for QR code…</span>
  </div>

  <div class="history">
    <div class="history-title">Last Scans</div>
    <div class="history-list" id="historyList">
      <div class="history-empty" id="historyEmpty">No scans yet</div>
    </div>
  </div>

  <div class="footer">Powered by Khodeir</div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Settings</div>
      <button class="modal-close" onclick="closeModal('settingsModal')">×</button>
    </div>
    <label for="setCenterName">Center Name</label>
    <input type="text" id="setCenterName" placeholder="e.g. Al Noor Center">

    <label for="setLogoUrl">Logo URL</label>
    <input type="url" id="setLogoUrl" placeholder="https://…/logo.png">

    <label for="setDefaultFee">Default Payment Amount (EGP)</label>
    <input type="number" id="setDefaultFee" placeholder="e.g. 300" min="0">

    <label for="setDefaultGrade">Default Grade Level</label>
    <select id="setDefaultGrade">
      <option value="first">First Secondary</option>
      <option value="second">Second Secondary</option>
      <option value="third">Third Secondary</option>
    </select>

    <label for="setAccentColor">Accent Color</label>
    <input type="color" id="setAccentColor" value="#d4af6a">

    <button class="modal-btn" onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<!-- Search modal -->
<div class="modal-overlay" id="searchModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Search Student</div>
      <button class="modal-close" onclick="closeModal('searchModal')">×</button>
    </div>
    <input type="text" id="searchInput" placeholder="Student name…">
    <button class="modal-btn" onclick="runSearch()">Search</button>
    <div class="report-result" id="searchResult"></div>
  </div>
</div>

<!-- Reports modal -->
<div class="modal-overlay" id="reportsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Reports</div>
      <button class="modal-close" onclick="closeModal('reportsModal')">×</button>
    </div>
    <div class="report-list">
      <div class="report-item" onclick="runReport('today_attendance')">Today's Attendance</div>
      <div class="report-item" onclick="runReport('today_payment')">Today's Payment</div>
      <div class="report-item" onclick="runReport('this_month')">This Month</div>
      <div class="report-item" onclick="runReport('top_students')">Top Students</div>
      <div class="report-item" onclick="runReport('export_pdf')">Export PDF</div>
      <div class="report-item" onclick="runReport('export_excel')">Export Excel</div>
    </div>
    <div class="report-result" id="reportResult"></div>
  </div>
</div>

<script>
  // Webhooks — one per workflow. Point these at your real n8n endpoints.
  // Expected JSON response shapes are documented next to each call below.
  const WEBHOOKS = {
    attendance: "https://helmet-handrail-skipper.ngrok-free.dev/webhook-test/attendance&payment",
    payment:    "https://helmet-handrail-skipper.ngrok-free.dev/webhook-test/attendance&payment",
    search:     "https://helmet-handrail-skipper.ngrok-free.dev/webhook-test/attendance&payment",
    report:     "https://helmet-handrail-skipper.ngrok-free.dev/webhook-test/attendance&payment"
  };

  // How long a result card stays on screen before auto-resuming the camera.
  const RESULT_DISPLAY_MS = 4000;

  // In-memory settings (no localStorage — resets on reload, edit via the Settings modal each session)
  let settings = {
    centerName: "",
    logoUrl: "",
    defaultFee: "",
    defaultGrade: "first",
    accentColor: "#d4af6a"
  };

  // In-memory session stats (used as a fallback when the webhook response has no `stats` block)
  let sessionStats = { present: 0, paid: 0 };
  let backendStats = null; // set once a webhook response includes a `stats` object

  let currentMode = "attendance";
  let currentGrade = "first";
  let settingsInitialized = false;
  const GRADE_LABELS = { first: "First Secondary", second: "Second Secondary", third: "Third Secondary" };
  let scanner;
  let scannerRunning = false;
  let sending = false;
  let resumeTimer = null;
  let lastScanTimes = {}; // qr_code -> timestamp, for the per-code cooldown
  const COOLDOWN_MS = 5000;
  let history = [];
  const HISTORY_LIMIT = 8;

  /* ---------- Settings ---------- */
  function applySettings(){
    document.documentElement.style.setProperty('--accent', settings.accentColor);
    const centerEl = document.getElementById("centerNameDisplay");
    centerEl.textContent = settings.centerName || "";
    const logoEl = document.getElementById("logoPreview");
    if(settings.logoUrl){
      logoEl.src = settings.logoUrl;
      logoEl.style.display = "block";
    } else {
      logoEl.style.display = "none";
    }
    // reflect current values back into the settings form
    document.getElementById("setCenterName").value = settings.centerName;
    document.getElementById("setLogoUrl").value = settings.logoUrl;
    document.getElementById("setDefaultFee").value = settings.defaultFee;
    document.getElementById("setDefaultGrade").value = settings.defaultGrade;
    document.getElementById("setAccentColor").value = settings.accentColor;

    // only force the live grade selector to the default on first load, so it
    // doesn't override a grade the teacher already picked mid-session
    if(!settingsInitialized){
      document.getElementById("gradeLevel").value = settings.defaultGrade;
      currentGrade = settings.defaultGrade;
      settingsInitialized = true;
    }
  }

  function saveSettings(){
    settings.centerName = document.getElementById("setCenterName").value.trim();
    settings.logoUrl = document.getElementById("setLogoUrl").value.trim();
    settings.defaultFee = document.getElementById("setDefaultFee").value;
    settings.defaultGrade = document.getElementById("setDefaultGrade").value;
    settings.accentColor = document.getElementById("setAccentColor").value;
    applySettings();
    // an explicit save should apply the chosen default grade right away
    document.getElementById("gradeLevel").value = settings.defaultGrade;
    currentGrade = settings.defaultGrade;
    closeModal('settingsModal');
  }

  /* ---------- Modals ---------- */
  function openModal(id){ document.getElementById(id).classList.add('open'); }
  function closeModal(id){ document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-overlay').forEach(ov=>{
    ov.addEventListener('click', e=>{ if(e.target === ov) ov.classList.remove('open'); });
  });

  /* ---------- Mode ---------- */
  function setMode(mode){
    currentMode = mode;
    document.getElementById("modeAttendance").classList.toggle("active", mode === "attendance");
    document.getElementById("modePayment").classList.toggle("active", mode === "payment");
    document.getElementById("paymentFields").classList.toggle("visible", mode === "payment");
    document.getElementById("paymentHint").textContent = "";

    if(mode === "payment"){
      if(!document.getElementById("payMonth").value){
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, "0");
        document.getElementById("payMonth").value = `${yyyy}-${mm}`;
      }
      if(!document.getElementById("payAmount").value && settings.defaultFee){
        document.getElementById("payAmount").value = settings.defaultFee;
      }
    }

    if(!sending){
      setStatus("Waiting for QR code…", "wait");
    }
  }

  function setGrade(grade){
    currentGrade = grade;
  }

  function beep(type){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = "sine";
      if(type === "success"){ o.frequency.value = 880; g.gain.value = 0.15; }
      else if(type === "duplicate"){ o.frequency.value = 520; g.gain.value = 0.12; }
      else { o.frequency.value = 220; g.gain.value = 0.15; }
      o.start();
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      o.stop(ctx.currentTime + 0.35);
    }catch(e){}
  }

  /* ---------- Status rendering ---------- */
  function setStatus(message, type, detailed){
    const status = document.getElementById("status");
    status.className = type + (detailed ? " detailed" : "");
    status.innerHTML = `<span class="dot"></span><span id="status-text">${message}</span>`;
    document.getElementById("scanFrame").classList.toggle("locked", type !== "wait");
  }

  function setLoadingStatus(message){
    const status = document.getElementById("status");
    status.className = "wait";
    status.innerHTML = `<div class="spinner"></div><span id="status-text">${message}</span>`;
    document.getElementById("scanFrame").classList.add("locked");
  }

  function renderResultCard(kind, s, extra, ok){
    // kind: "attendance" | "payment"
    const status = document.getElementById("status");
    status.className = (ok ? "success" : "warning") + " detailed";

    const photoHtml = s.image_url
      ? `<img class="result-photo" src="${s.image_url}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'result-photo-fallback',innerText:'👤'}))">`
      : `<div class="result-photo-fallback">👤</div>`;

    let statsHtml = "";
    if(kind === "attendance"){
      statsHtml = `
        <div class="result-stats">
          <div class="result-stat"><div class="num">${s.attendance_count ?? "–"}</div><div class="lab">Attendance</div></div>
          <div class="result-stat"><div class="num">${s.absence_count ?? "–"}</div><div class="lab">Absence</div></div>
          <div class="result-stat"><div class="chip ${s.payment_status === 'paid' ? 'paid' : 'unpaid'}">${s.payment_status === 'paid' ? 'Paid' : 'Unpaid'}</div><div class="lab">Payment</div></div>
        </div>`;
    } else {
      statsHtml = `
        <div class="result-stats">
          <div class="result-stat"><div class="num">${s.month ?? extra.month ?? "–"}</div><div class="lab">Month</div></div>
          <div class="result-stat"><div class="num">${s.amount ?? extra.amount ?? "–"}</div><div class="lab">EGP</div></div>
          <div class="result-stat"><div class="chip paid">Paid</div><div class="lab">Status</div></div>
        </div>`;
    }

    status.innerHTML = `
      <div class="result-card">
        <div class="result-check">${ok ? "✅" : "⚠️"}</div>
        <div class="result-title">${kind === "payment" ? "Payment Confirmed" : "Attendance Recorded"}</div>
        <div class="result-divider"></div>
        <div class="result-student">
          ${photoHtml}
          <div>
            <div class="result-name">${s.name ?? ""}</div>
            <div class="result-sub">${kind === "payment" ? (s.time ?? "") : `${s.grade ?? GRADE_LABELS[currentGrade]} · ${s.time ?? ""}`}</div>
          </div>
        </div>
        ${statsHtml}
        <button type="button" class="next-scan-btn" onclick="scanNext()">📷 Scan Next Student</button>
        <div class="auto-resume-note" id="autoResumeNote"></div>
      </div>`;
    document.getElementById("scanFrame").classList.add("locked");
    armAutoResume();
  }

  /* ---------- Dashboard ---------- */
  function bumpStat(el){
    el.classList.add("bump");
    setTimeout(()=>el.classList.remove("bump"), 250);
  }

  function updateDashboard(stats, kind){
    if(stats){
      backendStats = stats;
      document.getElementById("statStudents").textContent = stats.students_today ?? "–";
      document.getElementById("statPresent").textContent = stats.present ?? "–";
      document.getElementById("statAbsent").textContent = stats.absent ?? "–";
      document.getElementById("statPaid").textContent = stats.paid_today ?? "–";
      return;
    }
    // Fallback: no backend stats provided, track locally for this session only.
    if(kind === "attendance"){
      sessionStats.present += 1;
      const el = document.getElementById("statPresent");
      el.textContent = sessionStats.present;
      bumpStat(el);
    } else if(kind === "payment"){
      sessionStats.paid += 1;
      const el = document.getElementById("statPaid");
      el.textContent = sessionStats.paid;
      bumpStat(el);
    }
  }

  /* ---------- History ---------- */
  function pushHistory(name, time, ok){
    history.unshift({ name, time, ok });
    if(history.length > HISTORY_LIMIT) history.pop();
    renderHistory();
  }

  function renderHistory(){
    const list = document.getElementById("historyList");
    if(history.length === 0){
      list.innerHTML = `<div class="history-empty" id="historyEmpty">No scans yet</div>`;
      return;
    }
    list.innerHTML = history.map(h => `
      <div class="history-item">
        <div class="history-name">${h.ok ? "✔" : "✖"} ${h.name}</div>
        <div class="history-time">${h.time}</div>
      </div>
    `).join("");
  }

  /* ---------- Cooldown ---------- */
  function isOnCooldown(code){
    const last = lastScanTimes[code];
    if(!last) return 0;
    const elapsed = Date.now() - last;
    return elapsed < COOLDOWN_MS ? COOLDOWN_MS - elapsed : 0;
  }

  function showCooldownBadge(remainingMs){
    const badge = document.getElementById("cooldownBadge");
    const secondsEl = document.getElementById("cooldownSeconds");
    let remaining = Math.ceil(remainingMs / 1000);
    secondsEl.textContent = remaining;
    badge.classList.add("show");
    const interval = setInterval(()=>{
      remaining -= 1;
      if(remaining <= 0){
        clearInterval(interval);
        badge.classList.remove("show");
      } else {
        secondsEl.textContent = remaining;
      }
    }, 1000);
  }

  /* ---------- Auto-resume after a result is shown ---------- */
  function armAutoResume(){
    if(resumeTimer) clearTimeout(resumeTimer);
    let remaining = Math.ceil(RESULT_DISPLAY_MS / 1000);
    const note = document.getElementById("autoResumeNote");
    if(note) note.textContent = `Next scan opens automatically in ${remaining}s`;
    const tick = setInterval(()=>{
      remaining -= 1;
      const n = document.getElementById("autoResumeNote");
      if(!n){ clearInterval(tick); return; }
      if(remaining <= 0){ clearInterval(tick); }
      else n.textContent = `Next scan opens automatically in ${remaining}s`;
    }, 1000);
    resumeTimer = setTimeout(()=>{
      clearInterval(tick);
      scanNext();
    }, RESULT_DISPLAY_MS);
  }

  // Manual "scan next" — also used by the auto-resume timer.
  function scanNext(){
    if(resumeTimer){ clearTimeout(resumeTimer); resumeTimer = null; }
    startScanner();
  }

  /* ---------- Scanning ---------- */
  function onScanSuccess(decodedText){
    if(sending) return;

    const cooldownRemaining = isOnCooldown(decodedText);
    if(cooldownRemaining > 0){
      showCooldownBadge(cooldownRemaining);
      return;
    }

    let month = "";
    let amount = "";
    if(currentMode === "payment"){
      month = document.getElementById("payMonth").value;
      amount = document.getElementById("payAmount").value;
      if(!month || !amount){
        document.getElementById("paymentHint").textContent = "Please enter the month and amount first";
        return;
      }
    }

    lastScanTimes[decodedText] = Date.now();
    sending = true;
    stopScanner();

    const webhookUrl = WEBHOOKS[currentMode];
    setLoadingStatus(currentMode === "payment" ? "Confirming payment…" : "Sending attendance…");

    const payload = { qr_code: decodedText, mode: currentMode, grade: currentGrade, grade_label: GRADE_LABELS[currentGrade] };
    if(currentMode === "payment"){
      payload.month = month;
      payload.amount = amount;
    }

    fetch(webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(async response => {
      let data = {};
      try{ data = await response.json(); }catch(e){}
      sending = false;

      if(data.success){
        const s = data.student || {};
        renderResultCard(currentMode, s, { month, amount }, true);
        updateDashboard(data.stats, currentMode);
        pushHistory(s.name || "Student", s.time || "", true);
        if(currentMode === "payment"){
          document.getElementById("payAmount").value = "";
        }
        beep("success");
      } else {
        const msg = data.message || "Something went wrong";
        const alreadyRecorded = data.already_recorded || /already|مسجل|مدفوع/i.test(msg);
        setStatus((alreadyRecorded ? "🔴 " : "⚠️ ") + msg, alreadyRecorded ? "error" : "warning", false);
        document.getElementById("scanFrame").classList.add("locked");
        beep(alreadyRecorded ? "error" : "duplicate");
        pushHistory(data.student?.name || "Unknown", new Date().toLocaleTimeString(), false);
        armAutoResumeSimple();
      }
    })
    .catch(error => {
      console.error(error);
      sending = false;
      setStatus("Can't connect to n8n", "error", false);
      document.getElementById("scanFrame").classList.add("locked");
      beep("error");
      armAutoResumeSimple();
    });
  }

  // Simpler auto-resume for the plain (non-card) error/warning statuses.
  function armAutoResumeSimple(){
    if(resumeTimer) clearTimeout(resumeTimer);
    resumeTimer = setTimeout(scanNext, RESULT_DISPLAY_MS);
  }

  function onScanFailure(){}

  function stopScanner(){
    if(scanner && scannerRunning){
      scannerRunning = false;
      scanner.clear().catch(()=>{});
    }
  }

  function startScanner(){
    sending = false;
    document.getElementById("paymentHint").textContent = "";
    setStatus("Waiting for QR code…", "wait");
    document.getElementById("reader").innerHTML = "";
    scanner = new Html5QrcodeScanner(
      "reader",
      { fps: 12, qrbox: 240, rememberLastUsedCamera: true },
      false
    );
    scanner.render(onScanSuccess, onScanFailure);
    scannerRunning = true;
  }

  /* ---------- Search ---------- */
  function runSearch(){
    const query = document.getElementById("searchInput").value.trim();
    const resultEl = document.getElementById("searchResult");
    if(!query){
      resultEl.classList.add("show");
      resultEl.innerHTML = "Type a student name to search.";
      return;
    }
    resultEl.classList.add("show");
    resultEl.innerHTML = `<div class="spinner" style="display:inline-block;margin-right:8px;vertical-align:middle;"></div>Searching…`;

    fetch(WEBHOOKS.search, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "search", query, grade: currentGrade })
    })
    .then(async response => {
      let data = {};
      try{ data = await response.json(); }catch(e){}
      if(data.success && data.student){
        const s = data.student;
        resultEl.innerHTML = `
          <b>${s.name ?? ""}</b><br>
          Attendance: <b>${s.attendance_count ?? "–"}</b> &nbsp; Absence: <b>${s.absence_count ?? "–"}</b><br>
          Payment: <span class="chip ${s.payment_status === 'paid' ? 'paid' : 'unpaid'}">${s.payment_status === 'paid' ? 'Paid' : 'Unpaid'}</span><br>
          Last Attendance: <b>${s.last_attendance ?? "–"}</b>
        `;
      } else {
        resultEl.innerHTML = data.message || "No student found.";
      }
    })
    .catch(()=>{
      resultEl.innerHTML = "Can't connect to n8n.";
    });
  }

  /* ---------- Reports ---------- */
  function runReport(type){
    const resultEl = document.getElementById("reportResult");
    resultEl.classList.add("show");
    resultEl.innerHTML = `<div class="spinner" style="display:inline-block;margin-right:8px;vertical-align:middle;"></div>Loading…`;

    fetch(WEBHOOKS.report, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "report", report_type: type })
    })
    .then(async response => {
      let data = {};
      try{ data = await response.json(); }catch(e){}

      if(!data.success){
        resultEl.innerHTML = data.message || "Couldn't load this report.";
        return;
      }

      if(type === "export_pdf" || type === "export_excel"){
        if(data.url){
          window.open(data.url, "_blank");
          resultEl.innerHTML = "Export ready — opening in a new tab.";
        } else {
          resultEl.innerHTML = "Export URL missing from response.";
        }
        return;
      }

      // Generic key/value rendering for stat-style reports
      const rows = Object.entries(data.data || {}).map(
        ([k, v]) => `<div>${k.replace(/_/g," ")}: <b>${v}</b></div>`
      ).join("");
      resultEl.innerHTML = rows || "No data returned.";
    })
    .catch(()=>{
      resultEl.innerHTML = "Can't connect to n8n.";
    });
  }

  applySettings();
  startScanner();
</script>
</body>
</html>
