<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Attendance Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
width:95%;
max-width:550px;
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,.4);
text-align:center;
}

h1{
font-size:30px;
margin-bottom:8px;
color:#38bdf8;
}

h2{
font-size:20px;
margin-bottom:20px;
color:#fff;
}

#reader{
width:100%;
margin:auto;
overflow:hidden;
border-radius:15px;
}

#status{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.success{
color:#22c55e;
}

.error{
color:#ef4444;
}

.wait{
color:#facc15;
}

.footer{
margin-top:20px;
color:#94a3b8;
font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<h1>🎓 Student Attendance</h1>
<h2>Mr Abdullah El-shafey</h2>

<div id="reader"></div>

<div id="status" class="wait">
📷 Waiting for QR Code...
</div>

<div class="footer">
Powered by n8n & QR Attendance System
</div>

</div>

<script>

const WEBHOOK_URL="https://helmet-handrail-skipper.ngrok-free.dev/webhook-test/attendance";

let scanner;
let sending=false;

function setStatus(message,type){

const status=document.getElementById("status");

status.className=type;
status.innerHTML=message;

}

function onScanSuccess(decodedText,decodedResult){

if(sending) return;

sending=true;

scanner.clear();

setStatus("⏳ Sending attendance...","wait");

fetch(WEBHOOK_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

qr_code:decodedText

})

})

.then(async response=>{

let data={};

try{

data=await response.json();

}catch(e){}

setStatus("✅ "+(data.message||"Attendance Recorded"),"success");

setTimeout(startScanner,2500);

})

.catch(error=>{

console.error(error);

setStatus("❌ Cannot connect to n8n","error");

setTimeout(startScanner,2500);

});

}

function onScanFailure(error){

}

function startScanner(){

sending=false;

document.getElementById("reader").innerHTML="";

scanner=new Html5QrcodeScanner(

"reader",

{

fps:10,

qrbox:250,

rememberLastUsedCamera:true

},

false

);

scanner.render(onScanSuccess,onScanFailure);

}

startScanner();

</script>

</body>
</html>
