<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#d4af6a;
    --accent-2:#e8c584;
    --success:#5fb488;
    --warning:#d4af6a;
    --error:#c8695f;
    --glass:rgba(255,255,255,0.05);
    --glass-border:rgba(212,175,106,0.16);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    color:#f1ede4;
    background:#0c0b09;
  }
  .container{
    width:100%; max-width:460px;
    background:#151310;
    border:1px solid var(--glass-border);
    border-radius:20px;
    padding:32px 28px;
    text-align:center;
  }

  .eyebrow{
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--accent-2); font-weight:600; margin-bottom:6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:24px; font-weight:700;
    background:linear-gradient(90deg,#f8f4ea,#e8c584);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:4px;
  }
  h2{
    font-size:14px; font-weight:500; color:#a89c86;
    margin-bottom:22px;
  }

  /* Mode selector */
  .mode-toggle{
    display:flex; gap:8px; margin-bottom:20px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--glass-border);
    border-radius:14px; padding:5px;
  }
  .mode-btn{
    flex:1; border:none; cursor:pointer;
    padding:12px 10px; border-radius:10px;
    font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
    background:transparent; color:#a89c86;
    transition:all 0.2s ease;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .mode-btn.active{
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:#151310;
  }
  .mode-btn:not(.active):hover{ color:#f1ede4; }

  .scan-frame{
    position:relative; border-radius:16px; overflow:hidden;
    border:1px solid var(--glass-border);
    background:#000;
  }
  #reader{ width:100%; }
  .corner{
    position:absolute; width:26px; height:26px; z-index:3; pointer-events:none;
    border-color:var(--accent-2);
  }
  .corner.tl{ top:10px; left:10px; border-top:3px solid; border-left:3px solid; border-radius:6px 0 0 0; }
  .corner.tr{ top:10px; right:10px; border-top:3px solid; border-right:3px solid; border-radius:0 6px 0 0; }
  .corner.bl{ bottom:10px; left:10px; border-bottom:3px solid; border-left:3px solid; border-radius:0 0 0 6px; }
  .corner.br{ bottom:10px; right:10px; border-bottom:3px solid; border-right:3px solid; border-radius:0 0 6px 0; }
  .scan-line{
    position:absolute; left:6%; width:88%; height:2px; z-index:2;
    background:var(--accent-2);
    animation:sweep 2s linear infinite;
  }
  @keyframes sweep{
    0%{ top:8%; }
    100%{ top:92%; }
  }
  .scan-frame.locked .scan-line{ display:none; }

  #status{
    margin-top:20px;
    display:inline-flex; align-items:center; gap:8px;
    font-size:15px; font-weight:600;
    padding:10px 18px; border-radius:999px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--glass-border);
    transition:all 0.25s ease;
  }
  .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .wait .dot{ background:var(--warning); box-shadow:0 0 8px var(--warning); animation:pulse 1.4s infinite; }
  .success{ color:var(--success); border-color:rgba(95,180,136,0.35) !important; background:rgba(95,180,136,0.08) !important; }
  .success .dot{ background:var(--success); box-shadow:0 0 8px var(--success); }
  .duplicate{ color:var(--warning); border-color:rgba(212,175,106,0.35) !important; background:rgba(212,175,106,0.08) !important; }
  .duplicate .dot{ background:var(--warning); box-shadow:0 0 8px var(--warning); }
  .warning{ color:var(--warning); border-color:rgba(212,175,106,0.35) !important; background:rgba(212,175,106,0.08) !important; }
  .warning .dot{ background:var(--warning); box-shadow:0 0 8px var(--warning); }
  .error{ color:var(--error); border-color:rgba(200,105,95,0.35) !important; background:rgba(200,105,95,0.08) !important; }
  .error .dot{ background:var(--error); box-shadow:0 0 8px var(--error); }
  .wait{ color:var(--warning); }

  #status.detailed{
    display:block; text-align:left; border-radius:16px;
    padding:16px 20px; font-weight:400; line-height:1.7;
  }
  #status.detailed .dot{ display:none; }
  @keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.4; transform:scale(0.7); } }

  .footer{
    margin-top:22px; font-size:12px; color:#7a7263;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .footer::before, .footer::after{ content:""; flex:1; height:1px; background:var(--glass-border); }

  @media (prefers-reduced-motion: reduce){
    .blob, .scan-line, .dot, .container{ animation:none !important; }
  }
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">
  <div class="eyebrow">Live scanner</div>
  <h1>Student Attendance System</h1>
  <h2>Mr. Abdullah Elshafay</h2>

  <div class="mode-toggle">
    <button type="button" class="mode-btn active" id="modeAttendance" onclick="setMode('attendance')">
      🎓 Attendance
    </button>
    <button type="button" class="mode-btn" id="modePayment" onclick="setMode('payment')">
      💳 Payment
    </button>
  </div>

  <div class="scan-frame" id="scanFrame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line"></div>
    <div id="reader"></div>
  </div>

  <div id="status" class="wait">
    <span class="dot"></span>
    <span id="status-text">Waiting for QR code…</span>
  </div>

  <div class="footer">Powered by Khodeir</div>
</div>

<script>
  // Two separate n8n webhooks — one per mode.
  // Replace PAYMENT_WEBHOOK_URL with your real payment workflow's webhook URL.
  const WEBHOOKS = {
    attendance: "https://helmet-handrail-skipper.ngrok-free.dev/webhook-test/attendance",
    payment:    "https://helmet-handrail-skipper.ngrok-free.dev/webhook-test/confirm-payment"
  };

  let currentMode = "attendance";
  let scanner;
  let sending = false;

  function setMode(mode){
    currentMode = mode;
    document.getElementById("modeAttendance").classList.toggle("active", mode === "attendance");
    document.getElementById("modePayment").classList.toggle("active", mode === "payment");
    // Reset scanner state/UI when switching modes mid-flow
    if(!sending){
      setStatus("Waiting for QR code…", "wait");
    }
  }

  function beep(type){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = "sine";
      if(type === "success"){ o.frequency.value = 880; g.gain.value = 0.15; }
      else if(type === "duplicate"){ o.frequency.value = 520; g.gain.value = 0.12; }
      else { o.frequency.value = 220; g.gain.value = 0.15; }
      o.start();
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      o.stop(ctx.currentTime + 0.35);
    }catch(e){}
  }

  function setStatus(message, type, detailed){
    const status = document.getElementById("status");
    const text = document.getElementById("status-text");
    status.className = type + (detailed ? " detailed" : "");
    text.innerHTML = message;
    document.getElementById("scanFrame").classList.toggle("locked", type !== "wait");
  }

  function onScanSuccess(decodedText){
    if(sending) return;
    sending = true;
    scanner.clear();

    const webhookUrl = WEBHOOKS[currentMode];
    const loadingText = currentMode === "payment" ? "Confirming payment…" : "Sending attendance…";
    setStatus(loadingText, "wait");

    fetch(webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ qr_code: decodedText, mode: currentMode })
    })
    .then(async response => {
      let data = {};
      try{ data = await response.json(); }catch(e){}

      if(data.success){
        const s = data.student || {};
        if(currentMode === "payment"){
          setStatus(`
            ✅ <b>${data.message}</b><br><br>
            👤 <b>${s.name ?? ""}</b><br>
            📅 Month: <b>${s.month ?? ""}</b><br>
            🕒 Time: <b>${s.time ?? ""}</b>
          `, "success", true);
        } else {
          setStatus(`
            ✅ <b>${data.message}</b><br><br>
            👤 <b>${s.name ?? ""}</b><br>
            🎓 Grade: <b>${s.grade ?? ""}</b><br>
            🕒 Time: <b>${s.time ?? ""}</b><br>
            📅 Date: <b>${s.date ?? ""}</b>
          `, "success", true);
        }
        beep("success");
      } else {
        const msg = data.message || "Something went wrong";
        const alreadyRecorded = data.already_recorded || /already|مسجل|مدفوع/i.test(msg);
        if(alreadyRecorded){
          setStatus("🔴 " + msg, "error");
          beep("error");
        } else {
          setStatus("⚠️ " + msg, "warning");
          beep("duplicate");
        }
      }
      setTimeout(startScanner, 3500);
    })
    .catch(error => {
      console.error(error);
      setStatus("Can't connect to n8n", "error");
      beep("error");
      setTimeout(startScanner, 2500);
    });
  }

  function onScanFailure(){}

  function startScanner(){
    sending = false;
    setStatus("Waiting for QR code…", "wait");
    document.getElementById("reader").innerHTML = "";
    scanner = new Html5QrcodeScanner(
      "reader",
      { fps: 12, qrbox: 240, rememberLastUsedCamera: true },
      false
    );
    scanner.render(onScanSuccess, onScanFailure);
  }

  startScanner();
</script>
</body>
</html>
