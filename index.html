<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{
    margin:0;
    padding:0;
    background:#111827;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

h1{
    margin-top:30px;
}

p{
    color:#d1d5db;
}

#reader{
    width:100%;
    margin-top:20px;
}

#status{
    margin-top:25px;
    font-size:22px;
    font-weight:bold;
}

.success{
    color:#22c55e;
}

.error{
    color:#ef4444;
}
</style>

</head>

<body>

<div class="container">

<h1>📷 QR Attendance Scanner</h1>

<p>Scan the student's QR Code</p>

<div id="reader"></div>

<div id="status">Waiting for camera...</div>

</div>

<script>

const webhook = "https://helmet-handrail-skipper.ngrok-free.dev/webhook-test/attendance";

let scanned = false;

function onScanSuccess(decodedText){

    if(scanned) return;

    scanned = true;

    document.getElementById("status").innerHTML="⏳ Checking attendance...";

    fetch(webhook,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            qr_code:decodedText
        })
    })
    .then(res=>res.json())
    .then(data=>{

        document.getElementById("status").className="success";
        document.getElementById("status").innerHTML=
        "✅ " + (data.message || "Attendance Recorded");

    })
    .catch(err=>{

        console.error(err);

        document.getElementById("status").className="error";
        document.getElementById("status").innerHTML=
        "❌ Cannot connect to n8n";

        scanned = false;

    });

}

function onScanFailure(error){
    // تجاهل أخطاء القراءة المستمرة
}

Html5Qrcode.getCameras()
.then(devices => {

    if(devices && devices.length){

        document.getElementById("status").innerHTML="📷 Camera Ready";

        const scanner = new Html5QrcodeScanner(
            "reader",
            {
                fps:10,
                qrbox:{width:250,height:250},
                rememberLastUsedCamera:true
            },
            false
        );

        scanner.render(onScanSuccess,onScanFailure);

    }else{

        document.getElementById("status").className="error";
        document.getElementById("status").innerHTML="❌ No Camera Found";

    }

})
.catch(err=>{

    console.error(err);

    document.getElementById("status").className="error";
    document.getElementById("status").innerHTML=
    "❌ Please Allow Camera Permission";

});

</script>

</body>
</html>
